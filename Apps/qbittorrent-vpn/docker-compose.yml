name: qbittorrent-vpn

# ─── Services ────────────────────────────────────────────────────────────────

services:
  vpn:
    image: qmcgaw/gluetun:latest
    cap_add:
      - NET_ADMIN
    networks:
      - qbittorrentvpn_net
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/gluetun
        target: /tmp/gluetun
    environment:
      VPN_SERVICE_PROVIDER: protonvpn
      VPN_TYPE: openvpn
      OPENVPN_USER: ""
      OPENVPN_PASSWORD: ""
      WIREGUARD_PRIVATE_KEY: ""
      WIREGUARD_ADDRESS: ""
      SERVER_COUNTRIES: Netherlands
      VPN_PORT_FORWARDING: "on"
      VPN_PORT_FORWARDING_UP_COMMAND: >-
        /bin/sh -c
        'wget -q -O- --post-data "json={\"listen_port\":{{PORT}}}"
        "http://localhost:8080/api/v2/app/setPreferences" 2>/dev/null; true'
      LOG_LEVEL: warning
    ports:
      - target: 8080
        published: "8080"
        protocol: tcp
      - target: 6881
        published: "6881"
        protocol: tcp
      - target: 6881
        published: "6881"
        protocol: udp
      - target: 8191
        published: "8191"
        protocol: tcp
    restart: unless-stopped
    x-casaos:
      envs:
        - container: VPN_SERVICE_PROVIDER
          description:
            en_us: "VPN provider name (e.g. protonvpn, mullvad, nordvpn). See Gluetun docs for full list."
        - container: VPN_TYPE
          description:
            en_us: "VPN protocol: openvpn or wireguard"
        - container: OPENVPN_USER
          description:
            en_us: "OpenVPN username (required when VPN_TYPE=openvpn). For ProtonVPN, append +pmp to username."
        - container: OPENVPN_PASSWORD
          description:
            en_us: "OpenVPN password (required when VPN_TYPE=openvpn)"
        - container: WIREGUARD_PRIVATE_KEY
          description:
            en_us: "WireGuard private key (required when VPN_TYPE=wireguard)"
        - container: WIREGUARD_ADDRESS
          description:
            en_us: "WireGuard interface address e.g. 10.64.0.1/32 (required when VPN_TYPE=wireguard)"
        - container: SERVER_COUNTRIES
          description:
            en_us: "Preferred VPN server country (e.g. Netherlands, Switzerland)"
        - container: VPN_PORT_FORWARDING
          description:
            en_us: "Enable VPN port forwarding for better torrent performance (on/off). Not all providers support this."
      ports:
        - container: "8080"
          description:
            en_us: qBittorrent WebUI
        - container: "8191"
          description:
            en_us: FlareSolverr (internal Cloudflare bypass proxy)
        - container: "6881"
          description:
            en_us: Torrent port (TCP)
        - container: "6881"
          description:
            en_us: Torrent port (UDP)
          protocol: udp
      volumes:
        - container: /tmp/gluetun
          description:
            en_us: Gluetun VPN state and certificates

  qbittorrent:
    image: linuxserver/qbittorrent:4.6.7
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      UMASK: "002"
      WEBUI_PORT: "8080"
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/qbittorrent
        target: /config
      - type: bind
        source: /DATA
        target: /DATA
    network_mode: service:vpn
    restart: unless-stopped
    x-casaos:
      envs:
        - container: WEBUI_PORT
          description:
            en_us: qBittorrent Web UI port (do not change)
      volumes:
        - container: /config
          description:
            en_us: qBittorrent configuration
        - container: /DATA
          description:
            en_us: Full data directory (downloads, media, etc.)

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:v3.4.5
    environment:
      TZ: $TZ
      LOG_LEVEL: info
      LOG_HTML: "false"
      CAPTCHA_SOLVER: "none"
    network_mode: service:vpn
    restart: unless-stopped
    x-casaos:
      envs:
        - container: LOG_LEVEL
          description:
            en_us: FlareSolverr log verbosity (info, debug, warning)

# ─── Networks ─────────────────────────────────────────────────────────────────

networks:
  qbittorrentvpn_net:
    driver: bridge

# ─── CasaOS App Metadata ─────────────────────────────────────────────────────

x-casaos:
  architectures:
    - amd64
    - arm64
  main: vpn
  store_app_id: qbittorrent-vpn
  author: vantezzen
  category: Downloader
  description:
    en_us: |
      qBittorrent with a built-in VPN (powered by Gluetun) and FlareSolverr for bypassing Cloudflare-protected torrent sites.

      All torrent traffic is routed through your VPN. Supports ProtonVPN, Mullvad, NordVPN, and any other Gluetun-compatible provider.
  developer: vantezzen
  icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/qBittorrent/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/qBittorrent/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/qBittorrent/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/qBittorrent/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/qBittorrent/thumbnail.png
  tagline:
    en_us: qBittorrent with built-in VPN
  title:
    en_us: qBittorrent (VPN)
  index: /
  port_map: "8080"
  tips:
    before_install:
      en_us: |
        Set your VPN credentials in the **vpn** service environment variables before starting.

        **ProtonVPN (OpenVPN) example:**
        | Variable | Value |
        |---|---|
        | `VPN_SERVICE_PROVIDER` | `protonvpn` |
        | `VPN_TYPE` | `openvpn` |
        | `OPENVPN_USER` | Your username **+ `+pmp`** (e.g. `user+pmp`) |
        | `OPENVPN_PASSWORD` | Your password |

        **Mullvad (WireGuard) example:**
        | Variable | Value |
        |---|---|
        | `VPN_SERVICE_PROVIDER` | `mullvad` |
        | `VPN_TYPE` | `wireguard` |
        | `WIREGUARD_PRIVATE_KEY` | Your WireGuard private key |
        | `WIREGUARD_ADDRESS` | e.g. `10.64.0.1/32` |

        ⚠️ Set `VPN_PORT_FORWARDING=off` if your provider doesn't support it!

        On first launch, qBittorrent generates a temporary password — find it in the container logs.
        Downloads and media are accessible under `/DATA` inside the container.
